spring:
  application:
    name: carsales
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
      hibernate:
        ddl-auto: update   # create, create-drop, validate, none
      show-sql: true
      properties:
        hibernate:
          format_sql: true

  sql:
      init:
        mode: always
  servlet:
    multipart:
      max-file-size: 5MB

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      chat:
        options:
          model: llama3


server:
  port: 8081